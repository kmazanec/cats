# GitLab CI for CATS.
#
# Runner: shell executor on the same Digital Ocean droplet that hosts CATS,
# OpenEMR, and the existing Caddy reverse proxy. The runner *is* the deploy
# host — `deploy` does `git pull` + `docker compose up -d --build` in place.
#
# Required CI variables (Project Settings -> CI/CD -> Variables):
#   CATS_DEPLOY_DIR  - absolute path on the droplet where the repo is
#                      checked out and docker-compose runs from
#                      (e.g. /srv/cats). The deploy job self-bootstraps
#                      this dir on first run via the GitLab job token.
#
# Required ONCE on the droplet, in $CATS_DEPLOY_DIR/.env (NOT in CI
# variables — we deliberately keep secrets off the job token):
#   CATS_ADMIN_EMAIL, CATS_ADMIN_PASSWORD     - bootstrap admin login
#   CATS_SESSION_SECRET                        - `openssl rand -hex 32`
#   OPENROUTER_API_KEY                         - LLM provider (optional R1)
#   LANGSMITH_API_KEY, LANGSMITH_PROJECT,      - observability (optional)
#     LANGSMITH_TRACING
#   DEFAULT_TARGET_NAME, DEFAULT_TARGET_BASE_URL, DEFAULT_TARGET_ENV
#                                              - seeds the default target
# See .env.example for the full template.
#
# Variables provided automatically by GitLab and consumed below:
#   CI_COMMIT_SHORT_SHA   - baked into the image as CATS_BUILD_SHA
#   CI_PIPELINE_URL       - shown in the dashboard as the build link
#   CI_JOB_TOKEN          - used by the deploy job to clone/fetch repo
#   CI_SERVER_HOST,       - composed into the HTTPS clone URL
#     CI_PROJECT_PATH

stages:
  - lint
  - test
  - deploy

default:
  tags:
    - cats-droplet
  interruptible: true

# ---------------------------------------------------------------------------
# Shared: the cats-droplet runner is a *shell executor* (same host runs the
# `deploy` job's `docker compose` and the OpenEMR pipeline's test containers).
# So the top-level `image:` key would be ignored — instead we run lint/test
# inside `docker run` against the uv image, mirroring how the OpenEMR
# project's CI runs PHP/Node test jobs on this same runner.
#
# File-ownership isolation: containers run as the gitlab-runner UID/GID
# (`-u "$(id -u):$(id -g)"`) so anything the container writes — `.venv/`,
# tool caches, and especially `__pycache__/` directories that pytest/mypy
# spray across `src/` and `tests/` on import — is owned by the runner user.
# That makes the next pipeline's `git clean` work. (OpenEMR's CI works
# around the same problem with named volumes per-path; we'd have to mount
# a volume on every subdir Python imports from, which is unworkable, so
# we run unprivileged instead.)
#
# All caches live inside the bind-mounted checkout. We don't use named
# Docker volumes for cache reuse: when Docker auto-creates a volume on
# first use, its top-level dir is owned by root and our non-root UID
# can't write into it without a pre-chown step. uv's cold install for
# this project is ~3s, so the speed gain isn't worth the extra config
# surface. HOME points at a per-job dir inside /work because the image's
# default /root is unwritable to the non-root UID.
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Lint — fast, deterministic. Runs on every push.
# ---------------------------------------------------------------------------

lint:
  stage: lint
  script:
    - |
      docker run --rm \
        -u "$(id -u):$(id -g)" \
        -v "$CI_PROJECT_DIR:/work" \
        -w /work \
        -e HOME=/work/.home-ci \
        -e UV_CACHE_DIR=/work/.uv-cache-ci \
        ghcr.io/astral-sh/uv:python3.12-bookworm-slim \
        sh -c '
          uv sync --all-extras --no-progress &&
          uv run ruff check . &&
          uv run ruff format --check . &&
          uv run mypy
        '
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# ---------------------------------------------------------------------------
# Test (unit) — fast. Integration tests have their own scheduled job.
# ---------------------------------------------------------------------------

test-unit:
  stage: test
  script:
    - |
      docker run --rm \
        -u "$(id -u):$(id -g)" \
        -v "$CI_PROJECT_DIR:/work" \
        -w /work \
        -e HOME=/work/.home-ci \
        -e UV_CACHE_DIR=/work/.uv-cache-ci \
        ghcr.io/astral-sh/uv:python3.12-bookworm-slim \
        sh -c '
          uv sync --all-extras --no-progress &&
          uv run pytest tests/unit -q
        '
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# ---------------------------------------------------------------------------
# Deploy — main only. Shell runner pulls the new commit and rebuilds the
# `cats-api` container in place. The brief restart window is acceptable per
# round 1 scope.
# ---------------------------------------------------------------------------

deploy:
  stage: deploy
  script:
    - test -n "$CATS_DEPLOY_DIR" || (echo "CATS_DEPLOY_DIR not set" && exit 2)
    # Self-bootstrap: clone the repo into $CATS_DEPLOY_DIR on first deploy
    # using the per-pipeline job token over HTTPS (no long-lived ssh key
    # to manage). Idempotent — once a .git/ exists we just fetch + reset.
    # NOTE: the secrets-bearing .env still has to be placed in
    # $CATS_DEPLOY_DIR manually once; we deliberately never push secrets
    # through the job token.
    - |
      if [ ! -d "$CATS_DEPLOY_DIR/.git" ]; then
        echo "First-time deploy: cloning into $CATS_DEPLOY_DIR"
        mkdir -p "$CATS_DEPLOY_DIR"
        git clone "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" "$CATS_DEPLOY_DIR"
      fi
    - cd "$CATS_DEPLOY_DIR"
    # Re-point origin to the job-token URL each run so subsequent fetches
    # work even if the on-disk remote URL was set up differently.
    - git remote set-url origin "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
    - git fetch --prune origin main
    - git checkout main
    - git reset --hard "$CI_COMMIT_SHA"
    - test -f .env || (echo ".env not found in $CATS_DEPLOY_DIR — place it once with the production secrets (see .env.example)" && exit 2)
    - export CATS_BUILD_SHA="$CI_COMMIT_SHORT_SHA"
    - export CATS_GITLAB_PIPELINE_URL="$CI_PIPELINE_URL"
    - docker compose up -d --build
    # Smoke the deployed instance from inside the host network. Cold-start
    # can take 10-15s (migrations + admin seed + uvicorn boot) on a fresh
    # build, so retry rather than a single shot after a fixed sleep.
    - |
      for i in $(seq 1 30); do
        if docker compose exec -T api python -c "import urllib.request; urllib.request.urlopen('http://localhost:8400/healthz').read()" 2>/dev/null; then
          echo "healthz ok after ${i}s"
          exit 0
        fi
        sleep 1
      done
      echo "healthz never came up; last 60 lines of api logs:"
      docker compose logs api --tail=60
      exit 1
  environment:
    name: production
    url: https://cats.biograph.dev
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: on_success
    - if: $CI_COMMIT_TAG
      when: on_success

# Manual rollback job — pin to a previous CI_COMMIT_SHA via the GitLab UI.
rollback:
  stage: deploy
  script:
    - test -n "$CATS_DEPLOY_DIR" || (echo "CATS_DEPLOY_DIR not set" && exit 2)
    - test -n "$ROLLBACK_SHA" || (echo "Set ROLLBACK_SHA in the manual job UI" && exit 2)
    - cd "$CATS_DEPLOY_DIR"
    - git remote set-url origin "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
    - git fetch --prune origin
    - git checkout "$ROLLBACK_SHA"
    - export CATS_BUILD_SHA="$ROLLBACK_SHA"
    - export CATS_GITLAB_PIPELINE_URL="$CI_PIPELINE_URL"
    - docker compose up -d --build
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
