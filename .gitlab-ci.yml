# GitLab CI for CATS.
#
# Runner: shell executor on the same Digital Ocean droplet that hosts CATS,
# OpenEMR, and the existing Caddy reverse proxy. The runner *is* the deploy
# host — `deploy` does `git pull` + `docker compose up -d --build` in place.
#
# Required CI variables (Project Settings -> CI/CD -> Variables):
#   CATS_DEPLOY_DIR          - absolute path to the deploy checkout, e.g.
#                              /srv/cats. Owned by the runner user, has the
#                              docker-compose.yml in it.
#   CATS_ADMIN_EMAIL         - bootstrap admin email
#   CATS_ADMIN_PASSWORD      - bootstrap admin password (masked)
#   CATS_SESSION_SECRET      - long random string (masked)
#   OPENROUTER_API_KEY       - production key (masked, optional in R1)
#   LANGSMITH_API_KEY        - production key (masked, optional in R1)
#
# Variables provided automatically by GitLab and consumed below:
#   CI_COMMIT_SHORT_SHA       - baked into the image as CATS_BUILD_SHA
#   CI_PIPELINE_URL           - shown in the dashboard as the build link

stages:
  - lint
  - test
  - deploy

default:
  tags:
    - cats-droplet
  interruptible: true

# ---------------------------------------------------------------------------
# Shared: the cats-droplet runner is a *shell executor* (same host runs the
# `deploy` job's `docker compose` and the OpenEMR pipeline's test containers).
# So the top-level `image:` key would be ignored — instead we run lint/test
# inside `docker run` against the uv image, mirroring how the OpenEMR
# project's CI runs PHP/Node test jobs on this same runner.
#
# File-ownership isolation: the uv container runs as root, and a naked bind
# mount would let it drop root-owned files into the gitlab-runner-owned
# checkout — which the next pipeline's `git clean` (run as gitlab-runner)
# cannot remove. So every path the container writes to gets a named Docker
# volume mounted on top:
#   cats-ci-uv-cache    -> /root/.cache/uv      (uv's package cache, reused)
#   cats-ci-venv        -> /work/.venv          (the project venv uv builds)
#   cats-ci-ruff-cache  -> /work/.ruff_cache    (ruff's per-file cache)
#   cats-ci-mypy-cache  -> /work/.mypy_cache    (mypy's incremental cache)
#   cats-ci-pytest-cache-> /work/.pytest_cache  (pytest's lastfailed cache)
# Volumes persist between pipelines on the same daemon, giving us cache
# reuse for free. The runner's checkout only ever sees empty mount-point
# dirs that gitlab-runner *can* rmdir because it owns the parent. The
# `cache-prune` job at the bottom of this file is the manual nuke if one
# of these ever gets into a weird state.
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Lint — fast, deterministic. Runs on every push.
# ---------------------------------------------------------------------------

lint:
  stage: lint
  script:
    - |
      docker run --rm \
        -v "$CI_PROJECT_DIR:/work" \
        -v cats-ci-uv-cache:/root/.cache/uv \
        -v cats-ci-venv:/work/.venv \
        -v cats-ci-ruff-cache:/work/.ruff_cache \
        -v cats-ci-mypy-cache:/work/.mypy_cache \
        -w /work \
        -e UV_LINK_MODE=copy \
        ghcr.io/astral-sh/uv:python3.12-bookworm-slim \
        sh -c '
          uv sync --all-extras --no-progress &&
          uv run ruff check . &&
          uv run ruff format --check . &&
          uv run mypy
        '
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# ---------------------------------------------------------------------------
# Test (unit) — fast. Integration tests have their own scheduled job.
# ---------------------------------------------------------------------------

test-unit:
  stage: test
  script:
    - |
      docker run --rm \
        -v "$CI_PROJECT_DIR:/work" \
        -v cats-ci-uv-cache:/root/.cache/uv \
        -v cats-ci-venv:/work/.venv \
        -v cats-ci-pytest-cache:/work/.pytest_cache \
        -w /work \
        -e UV_LINK_MODE=copy \
        ghcr.io/astral-sh/uv:python3.12-bookworm-slim \
        sh -c '
          uv sync --all-extras --no-progress &&
          uv run pytest tests/unit -q
        '
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# ---------------------------------------------------------------------------
# Deploy — main only. Shell runner pulls the new commit and rebuilds the
# `cats-api` container in place. The brief restart window is acceptable per
# round 1 scope.
# ---------------------------------------------------------------------------

deploy:
  stage: deploy
  script:
    - test -n "$CATS_DEPLOY_DIR" || (echo "CATS_DEPLOY_DIR not set" && exit 2)
    - cd "$CATS_DEPLOY_DIR"
    - git fetch --prune origin main
    - git checkout main
    - git reset --hard "$CI_COMMIT_SHA"
    - export CATS_BUILD_SHA="$CI_COMMIT_SHORT_SHA"
    - export CATS_GITLAB_PIPELINE_URL="$CI_PIPELINE_URL"
    - docker compose up -d --build
    # Smoke the deployed instance from inside the host network.
    - sleep 4
    - docker compose exec -T api python -c "import urllib.request; urllib.request.urlopen('http://localhost:8400/healthz').read()"
  environment:
    name: production
    url: https://cats.biograph.dev
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: on_success
    - if: $CI_COMMIT_TAG
      when: on_success

# Manual rollback job — pin to a previous CI_COMMIT_SHA via the GitLab UI.
rollback:
  stage: deploy
  script:
    - test -n "$CATS_DEPLOY_DIR" || (echo "CATS_DEPLOY_DIR not set" && exit 2)
    - test -n "$ROLLBACK_SHA" || (echo "Set ROLLBACK_SHA in the manual job UI" && exit 2)
    - cd "$CATS_DEPLOY_DIR"
    - git fetch --prune origin
    - git checkout "$ROLLBACK_SHA"
    - export CATS_BUILD_SHA="$ROLLBACK_SHA"
    - export CATS_GITLAB_PIPELINE_URL="$CI_PIPELINE_URL"
    - docker compose up -d --build
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual

# ---------------------------------------------------------------------------
# Manual nuke for the named CI volumes. Run from the GitLab UI (CI/CD →
# Pipelines → "Run pipeline" on main, then click "Play" on this job) if a
# lockfile-vs-installed mismatch — or any other inconsistency — leaves a
# volume in a weird state. The next test pipeline reinstalls from scratch.
# Same idiom as the OpenEMR project's `cache-prune` job.
# ---------------------------------------------------------------------------
cache-prune:
  stage: lint
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
      allow_failure: true
  script:
    - docker volume rm -f cats-ci-uv-cache cats-ci-venv cats-ci-ruff-cache cats-ci-mypy-cache cats-ci-pytest-cache
    - docker volume ls --filter name=cats-ci-
