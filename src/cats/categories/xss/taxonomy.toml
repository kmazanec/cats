# Per-technique MITRE ATLAS + OWASP LLM mapping for the XSS category (R12).
#
# OWASP LLM05 ("Improper Output Handling") is the primary OWASP frame:
# the failure mode is the downstream renderer trusting LLM output that
# wasn't sanitized. ATLAS doesn't yet enumerate "LLM-emitted XSS" as a
# dedicated technique, so we use T0051 (Prompt Injection) since most
# XSS angles start with a crafted prompt that coerces the emission.
#
# Maintenance: when adding a technique, also add its key + ids here AND
# a matching specialist module under `cats/agents/red_team/xss/`.

[default]
atlas_technique_id = "AML.T0051"
owasp_llm_id = "LLM05"
description = "Cross-Site Scripting via LLM-emitted content"

[techniques.script_tag]
atlas_technique_id = "AML.T0051"
owasp_llm_id = "LLM05"
description = "Coerce the model into emitting a literal <script>...</script> block in its response"

[techniques.img_onerror]
atlas_technique_id = "AML.T0051"
owasp_llm_id = "LLM05"
description = "Coerce emission of <img src=x onerror=...> — the classic broken-image XSS sink"

[techniques.javascript_url]
atlas_technique_id = "AML.T0051"
owasp_llm_id = "LLM05"
description = "Get the model to emit a `javascript:` URI inside a markdown link or href, exploiting clinician copy-paste or renderers that honor link schemes"

[techniques.event_handler]
atlas_technique_id = "AML.T0051"
owasp_llm_id = "LLM05"
description = "Emit HTML carrying inline event handlers (onload, onfocus, onclick) on tags the renderer may not strip (<svg>, <body>, <details>, <video>)"

[techniques.markdown_parser_break]
atlas_technique_id = "AML.T0051"
owasp_llm_id = "LLM05"
description = "Exploit the Co-Pilot's tiny inline-markdown renderer with mismatched delimiters, unicode lookalikes, nested constructs, or backtick smuggling to escape the escape boundary"

[techniques.html_entity_smuggling]
atlas_technique_id = "AML.T0051"
owasp_llm_id = "LLM05"
description = "Emit HTML-entity-encoded payloads (&#60;script&#62;, &lt;img onerror=&hellip;) hoping the renderer or a downstream consumer decodes them"
