# Prod-only compose overlay for the droplet deploy. Applied with
# `docker compose -f docker-compose.yml -f docker-compose.prod.yml up`
# (the deploy job wires this via COMPOSE_FILE).
#
# On the droplet the cats-api container joins the existing
# openemr_default network so the OpenEMR caddy container can reach it
# as `cats-api:8400` without exposing a host port to the public
# internet. The base compose binds `8400:8400` on 0.0.0.0 — we keep
# that here only because the droplet's firewall closes 8400 to the
# outside world; in dev that binding is what `make api` talks to.
# Postgres and Redis are bound to 127.0.0.1 in the base file so they
# are never publicly reachable on either host.

services:
  api:
    networks:
      - default
      - openemr_default

  # Disable dev-only file-watch auto-reload on every worker — a deploy
  # rolls the worker images, we don't want watchmedo SIGTERMing a
  # mid-attack worker on every source bump. Each worker still has
  # ``restart: unless-stopped`` so a real crash still recovers.
  orchestrator:
    environment:
      CATS_DEV_RELOAD: "0"
  red_team:
    environment:
      CATS_DEV_RELOAD: "0"
  judge:
    environment:
      CATS_DEV_RELOAD: "0"
  documentation:
    environment:
      CATS_DEV_RELOAD: "0"

networks:
  # `external: true` means compose won't try to create the network —
  # it has to already exist on the host (the OpenEMR project's compose
  # stack creates it). If it's missing, `compose up` will fail loudly.
  openemr_default:
    external: true
