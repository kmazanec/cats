services:
  postgres:
    image: postgres:16-alpine
    container_name: cats-postgres
    environment:
      POSTGRES_USER: cats
      POSTGRES_PASSWORD: cats
      POSTGRES_DB: cats
    ports:
      - "5433:5432"
    volumes:
      - cats_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cats -d cats"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: cats-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cats-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Pull everything from the host-side .env (admin/session secrets, LLM keys,
    # tracing toggles, target wiring). The explicit `environment:` block below
    # only overrides values that have to differ inside the container.
    env_file:
      - .env
    environment:
      # Container-network hostnames — .env points the host at localhost:5433/6380,
      # but inside the compose network the services are reachable by name.
      DATABASE_URL: postgresql+asyncpg://cats:cats@postgres:5432/cats
      REDIS_URL: redis://redis:6379/0
      # Bind to all interfaces inside the container; .env's host-side value
      # could be 127.0.0.1, which would refuse the port mapping from outside.
      CATS_API_HOST: 0.0.0.0
      CATS_API_PORT: "8400"
      # host.docker.internal resolves to the Mac host from inside the container,
      # so the API can reach the openemr co-pilot running on the host at :8300.
      # .env uses localhost:8300 for host-side dev; we hardcode the in-container
      # value here so it wins regardless of what `.env` says (otherwise
      # env_file's localhost:8300 would unreachable from inside the container).
      DEFAULT_TARGET_BASE_URL: http://host.docker.internal:8300
    ports:
      - "8400:8400"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Hot-reload during development: mount source over the baked image copy.
      - ./src:/app/src
      - ./migrations:/app/migrations
      - ./alembic.ini:/app/alembic.ini
    command: >
      sh -c "alembic upgrade head &&
             uvicorn cats.api.app:app --host 0.0.0.0 --port 8400 --reload --reload-dir /app/src"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8400/healthz')"]
      interval: 10s
      timeout: 3s
      retries: 10

  # ---------------------------------------------------------------------------
  # Round 4 four-agent workers. Each is an independent process that talks to
  # the others via the Postgres-backed message bus (no in-process coupling).
  # They share the same image as the api (built once), the same .env, and
  # the same source-mount for hot-reload during development. The only thing
  # that differs per worker is the module entrypoint.
  #
  # Anchors below (&worker-base / *worker-base) factor out the shared config
  # so adding/tweaking a worker is a one-line change. `<<: *worker-base`
  # merges the anchor into each service definition.
  # ---------------------------------------------------------------------------
  # Dev-only file-watch reloader. When CATS_DEV_RELOAD=1 (default in
  # the committed .env for local dev), each worker runs under
  # ``watchmedo auto-restart`` so saving a .py file under ./src
  # SIGTERMs the worker and respawns it on the new code. The api
  # gets the same behavior via uvicorn ``--reload`` already.
  #
  # When CATS_DEV_RELOAD is unset/0 (prod via docker-compose.prod.yml
  # — which leaves the env var alone — and CI), workers run the bare
  # ``python -m`` entrypoint so a deploy doesn't restart workers
  # mid-attack on every source bump.
  #
  # The shell wrapper resolves the entrypoint module from the env
  # var the per-worker service sets (CATS_WORKER_MODULE) so the
  # command body stays identical across all four workers.
  orchestrator:
    build: &worker-build
      context: .
      dockerfile: Dockerfile
    depends_on: &worker-deps
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: &worker-env-file
      - .env
    environment: &worker-environment
      DATABASE_URL: postgresql+asyncpg://cats:cats@postgres:5432/cats
      REDIS_URL: redis://redis:6379/0
      DEFAULT_TARGET_BASE_URL: http://host.docker.internal:8300
      # Dev-default: file-watch reload on .py change. Prod overlay
      # sets this to 0 so a deploy doesn't restart workers mid-attack
      # on every source bump.
      CATS_DEV_RELOAD: ${CATS_DEV_RELOAD:-1}
    extra_hosts: &worker-extra-hosts
      - "host.docker.internal:host-gateway"
    volumes: &worker-volumes
      - ./src:/app/src
      - ./migrations:/app/migrations
      - ./alembic.ini:/app/alembic.ini
    restart: unless-stopped
    container_name: cats-orchestrator
    # When CATS_DEV_RELOAD=1 (dev default), wrap the worker in
    # ``watchmedo auto-restart``: it watches ./src/**/*.py inside the
    # container, sends SIGTERM to the worker on any change, waits up
    # to 5s for graceful shutdown (the Worker base class handles
    # SIGTERM via Worker.request_stop in messaging/worker.py), then
    # respawns on the new code. When CATS_DEV_RELOAD=0/unset (prod),
    # exec the bare python entrypoint.
    command: >
      sh -c 'if [ "$$CATS_DEV_RELOAD" = "1" ]; then
               exec uv run watchmedo auto-restart --patterns="*.py" --recursive --signal SIGTERM --kill-after 5 --directory /app/src -- python -m cats.workers.orchestrator;
             else
               exec uv run python -m cats.workers.orchestrator;
             fi'

  red_team:
    build: *worker-build
    depends_on: *worker-deps
    env_file: *worker-env-file
    environment: *worker-environment
    extra_hosts: *worker-extra-hosts
    volumes: *worker-volumes
    restart: unless-stopped
    container_name: cats-red-team
    command: >
      sh -c 'if [ "$$CATS_DEV_RELOAD" = "1" ]; then
               exec uv run watchmedo auto-restart --patterns="*.py" --recursive --signal SIGTERM --kill-after 5 --directory /app/src -- python -m cats.workers.red_team;
             else
               exec uv run python -m cats.workers.red_team;
             fi'

  judge:
    build: *worker-build
    depends_on: *worker-deps
    env_file: *worker-env-file
    environment: *worker-environment
    extra_hosts: *worker-extra-hosts
    volumes: *worker-volumes
    restart: unless-stopped
    container_name: cats-judge
    command: >
      sh -c 'if [ "$$CATS_DEV_RELOAD" = "1" ]; then
               exec uv run watchmedo auto-restart --patterns="*.py" --recursive --signal SIGTERM --kill-after 5 --directory /app/src -- python -m cats.workers.judge;
             else
               exec uv run python -m cats.workers.judge;
             fi'

  # Documentation handles two workloads on one inbox:
  # - per-attack VerdictRendered → write a Finding + report row (fast, <5s)
  # - CampaignReportRequested → run the LLM tool loop (10-60s, can be longer)
  # The bus uses ``FOR UPDATE SKIP LOCKED`` so multiple replicas split work
  # without colliding; a long-running campaign-report message ties up one
  # replica while the others keep handling verdicts. The long-running
  # handler calls Worker.touch_claim between LLM turns to keep its bus
  # claim alive without bumping the worker-class-wide visibility timeout.
  #
  # ``container_name`` is omitted so compose mints
  # ``cats-documentation-1``, ``cats-documentation-2`` … per replica.
  # Override replica count via the CATS_DOCUMENTATION_REPLICAS env var
  # (falls back to 2 — one reserved for fast verdicts, one for slow
  # rollups, in practice the workloads mix freely).
  documentation:
    build: *worker-build
    depends_on: *worker-deps
    env_file: *worker-env-file
    environment: *worker-environment
    extra_hosts: *worker-extra-hosts
    volumes: *worker-volumes
    restart: unless-stopped
    command: >
      sh -c 'if [ "$$CATS_DEV_RELOAD" = "1" ]; then
               exec uv run watchmedo auto-restart --patterns="*.py" --recursive --signal SIGTERM --kill-after 5 --directory /app/src -- python -m cats.workers.documentation;
             else
               exec uv run python -m cats.workers.documentation;
             fi'
    deploy:
      replicas: ${CATS_DOCUMENTATION_REPLICAS:-2}

volumes:
  cats_pg:
